  .wheelBox { position: relative; width: 200px; }

  .resultBox { 
    background: #4b4b4b; padding: 10px; margin: 5px; border-radius: 5px; 
    min-width: 150px; display: inline-block; border: 1px solid #000000;
  }
  
  button { 
    padding: 10px 40px; font-size: 20px; cursor: pointer; 
    background: #292929; color: white; border: 1px solid #000000; border-radius: 5px;
  }
</style>

    segments: ["Zwiebel", "Knoblauch", "Röstzwiebeln", "Chilli", "Petersilie", "Gratainkäse", "Vanillesoße", "Ei"]}
];

function drawWheel(config) {
  const canvas = document.getElementById(config.id);
  const ctx = canvas.getContext("2d");
  const sectors = config.segments.length;
  const arc = (Math.PI * 2) / sectors;

  config.segments.forEach((text, i) => {
    const angle = i * arc;
    ctx.fillStyle = text === EMPTY ? "#555" : (i % 2 === 0 ? "#3498db" : "#ecf0f1");
    ctx.beginPath();
    ctx.moveTo(100, 100);
    ctx.arc(100, 100, 98, angle, angle + arc);
    ctx.fill();
    ctx.stroke();

    ctx.save();
    ctx.translate(100, 100);
    ctx.rotate(angle + arc / 2);
    ctx.fillStyle = (i % 2 === 0 || text === EMPTY) ? "white" : "#2c3e50";
    ctx.font = "bold 10px Arial";
    ctx.fillText(text.substring(0, 12), 40, 5);
    ctx.restore();
  });
}

function spinAll() {
  // 1. Random Set aus dem ER-Modell wählen
  const selectedSet = MEAL_SETS[Math.floor(Math.random() * MEAL_SETS.length)];
  
  wheelConfigs.forEach((config, index) => {
    const canvas = document.getElementById(config.id);
    const val = selectedSet[`c${index+1}`]; // Holt c1, c2, c3...
    
    let targetIndex = config.segments.indexOf(val);
    if (targetIndex === -1) targetIndex = config.segments.indexOf(EMPTY);

    const segDeg = 360 / config.segments.length;
    
    // GESCHWINDIGKEITS-LOGIK: 
    // Je mehr Segmente, desto mehr Extra-Umdrehungen für das "schnellere" Gefühl
    const speedFactor = config.segments.length * 2; 
    const extraSpins = (10 + speedFactor) * 360; 

    const finalRotation = extraSpins + (360 - (targetIndex * segDeg)) - 90 - (segDeg/2);

    canvas.style.transform = `rotate(${finalRotation}deg)`;

    // Ergebnis-Anzeige
    setTimeout(() => {
      const resBox = document.getElementById(config.rid);
      // Wenn das Ergebnis der Placeholder ist, zeigen wir nichts oder "Keine" an
      resBox.innerText = (val === EMPTY) ? "- leer -" : val;
      resBox.style.opacity = (val === EMPTY) ? "0.5" : "1";
    }, 4000);
  });
}

// Init
wheelConfigs.forEach(drawWheel);
</script>
